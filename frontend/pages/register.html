<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../animations.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Parking — Register</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <!-- Page loader — paste at top of every page body -->
<div id="page-loader">
  <div class="loader-icon">🅿️</div>
  <div class="loader-title">SmartPark</div>
  <div class="loader-track">
    <div class="loader-fill"></div>
  </div>
  <div class="loader-dots">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
</div>

<!-- Floating particles background -->
<div class="particles-container"></div>

<!-- Scroll to top button -->
<button id="scroll-top">↑</button>
<div class="auth-page">

  <div class="auth-left">
    <div class="auth-illustration">🚗</div>
    <h1>Join Us Today</h1>
    <p>Create your free account and start booking parking slots in seconds</p>
    <div class="auth-features">
      <div class="auth-feature">🎯 &nbsp; No hidden charges</div>
      <div class="auth-feature">🔒 &nbsp; Secure & encrypted</div>
      <div class="auth-feature">📱 &nbsp; Easy to use</div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-box">
      <h2>Create account ✨</h2>
      <p class="sub">Fill in your details to get started</p>

      <div class="alert alert-error"   id="errorMsg"></div>
      <div class="alert alert-success" id="successMsg"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input class="form-control" type="text" id="name" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input class="form-control" type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" id="password" placeholder="Create a strong password">
      </div>

      <button class="btn btn-primary" onclick="register()">Create Account →</button>

      <p style="text-align:center; margin-top:20px; font-size:14px; color:#8892a4;">
        Already have an account? <a href="../index.html">Login here</a>
      </p>
    </div>
  </div>

</div>
<script src="../script.js"></script>
<script src="../app.js"></script>
</body>
</html>
