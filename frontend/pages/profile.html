<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — SmartPark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../animations.css">
  <link rel="stylesheet" href="../premium.css">
</head>
<body class="p-bg">

<div id="page-loader">
  <div class="loader-icon">🅿️</div>
  <div class="loader-title">SmartPark</div>
  <div class="loader-track"><div class="loader-fill"></div></div>
  <div class="loader-dots">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
</div>
<div class="particles-container"></div>
<button id="scroll-top">↑</button>

<nav class="p-navbar">
  <a href="dashboard.html" class="p-navbar-logo">
    <div class="p-logo-icon">🅿️</div>
    SmartPark
  </a>
  <div class="p-nav-links">
    <a href="dashboard.html"   class="p-nav-link">Dashboard</a>
    <a href="map.html"         class="p-nav-link">Find Parking</a>
    <a href="my-bookings.html" class="p-nav-link">My Bookings</a>
    <a href="my-vehicles.html" class="p-nav-link">My Vehicles</a>
    <a href="profile.html"     class="p-nav-link active">Profile</a>
  </div>
  <div style="display:flex;align-items:center;">
    <div class="p-nav-user">
      <div class="p-nav-avatar" id="navAvatar">U</div>
      <span class="p-nav-name" id="navName"></span>
    </div>
    <button class="p-btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div style="max-width:520px;margin:32px auto;padding:0 24px;">
  <div class="glass-card">

    <div class="p-profile-banner"></div>
    <div class="p-profile-avatar" id="profileAvatar">U</div>
    <div class="p-profile-name"  id="profileName">—</div>
    <div class="p-profile-email" id="profileEmail">—</div>

    <hr class="p-divider">

    <div class="p-section-tag">Settings</div>
    <div class="p-section-title" style="margin-bottom:20px;">Edit Profile</div>

    <div class="p-alert p-alert-error"   id="errorMsg"></div>
    <div class="p-alert p-alert-success" id="successMsg"></div>

    <div class="p-form-group">
      <label class="p-form-label">Full Name</label>
      <input class="p-form-input" type="text" id="name">
    </div>
    <div class="p-form-group">
      <label class="p-form-label">Email address</label>
      <input class="p-form-input" type="email" id="email">
    </div>
    <div class="p-form-group">
      <label class="p-form-label">
        New Password
        <span style="color:var(--p-text3);font-weight:400;text-transform:none;">
          (leave blank to keep current)
        </span>
      </label>
      <input class="p-form-input" type="password" id="password" placeholder="Enter new password">
    </div>

    <button class="p-btn p-btn-primary" onclick="updateProfile()">
      💾 Save Changes
    </button>

  </div>
</div>

<script src="../script.js"></script>
<script src="../app.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user) window.location.href = '../index.html';

  function logout() { localStorage.clear(); window.location.href='../index.html'; }

  function showAlert(id, msg, type='error') {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = `p-alert p-alert-${type}`;
    el.style.display = 'flex';
    setTimeout(() => el.style.display='none', 4000);
  }

  function fillProfile(u) {
    document.getElementById('navAvatar').textContent    = u.name.charAt(0).toUpperCase();
    document.getElementById('navName').textContent      = u.name;
    document.getElementById('profileAvatar').textContent= u.name.charAt(0).toUpperCase();
    document.getElementById('profileName').textContent  = u.name;
    document.getElementById('profileEmail').textContent = u.email||'';
    document.getElementById('name').value   = u.name;
    document.getElementById('email').value  = u.email||'';
  }
  fillProfile(user);

  async function updateProfile() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!name||!email) { showAlert('errorMsg','Name and email are required'); return; }
    const data = await apiPut(`/auth/profile/${user.id}`,{ name, email, password });
    if (data.message) {
      const updated = {...user, name, email};
      localStorage.setItem('user', JSON.stringify(updated));
      fillProfile(updated);
      showAlert('successMsg', data.message, 'success');
    } else { showAlert('errorMsg', data.error); }
  }
</script>
</body>
</html>
