<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile — Smart Parking</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<nav class="navbar">
  <h2>🅿️ Smart<span>Park</span></h2>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="my-bookings.html">My Bookings</a>
    <a href="my-vehicles.html">My Vehicles</a>
    <a href="profile.html" class="active">Profile</a>
  </div>
  <div style="display:flex;align-items:center;">
    <div class="nav-user">
      <div class="nav-avatar" id="navAvatar">U</div>
      <span class="nav-name" id="navName"></span>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page" style="max-width:500px;">
  <div class="card">
    <div class="profile-banner"></div>
    <div class="profile-avatar" id="profileAvatar">U</div>
    <div class="profile-name"  id="profileName">-</div>
    <div class="profile-email" id="profileEmail">-</div>

    <hr class="divider">

    <div class="alert alert-error"   id="errorMsg"></div>
    <div class="alert alert-success" id="successMsg"></div>

    <div class="card-title" style="margin-bottom:16px;">Edit Profile</div>

    <div class="form-group">
      <label>Full Name</label>
      <input class="form-control" type="text" id="name">
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input class="form-control" type="email" id="email">
    </div>
    <div class="form-group">
      <label>New Password <span style="color:#aaa;font-weight:400;">(leave blank to keep current)</span></label>
      <input class="form-control" type="password" id="password" placeholder="Enter new password">
    </div>

    <button class="btn btn-primary" onclick="updateProfile()">💾 Save Changes</button>
  </div>
</div>

<script src="../script.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user) window.location.href = '../index.html';

  function fillProfile(u) {
    document.getElementById('navAvatar').textContent    = u.name.charAt(0).toUpperCase();
    document.getElementById('navName').textContent      = u.name;
    document.getElementById('profileAvatar').textContent = u.name.charAt(0).toUpperCase();
    document.getElementById('profileName').textContent  = u.name;
    document.getElementById('profileEmail').textContent = u.email || '';
    document.getElementById('name').value   = u.name;
    document.getElementById('email').value  = u.email || '';
  }
  fillProfile(user);

  async function updateProfile() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!name || !email) { showAlert('errorMsg','Name and email are required'); return; }
    const data = await apiPut(`/auth/profile/${user.id}`, { name, email, password });
    if (data.message) {
      const updated = { ...user, name, email };
      localStorage.setItem('user', JSON.stringify(updated));
      fillProfile(updated);
      showAlert('successMsg', data.message, 'success');
    } else { showAlert('errorMsg', data.error); }
  }
</script>
</body>
</html>
