<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Smart Parking</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>

<nav class="navbar">
  <h2>🅿️ Smart<span>Park</span> <span style="font-size:11px;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:10px;margin-left:6px;">ADMIN</span></h2>
  <div class="nav-links">
    <a href="admin-dashboard.html" class="active">Dashboard</a>
    <a href="admin-slots.html">Manage Slots</a>
    <a href="admin-bookings.html">Bookings</a>
    <a href="admin-users.html">Users</a>
  </div>
  <div style="display:flex;align-items:center;">
    <div class="nav-user">
      <div class="nav-avatar" id="navAvatar">A</div>
      <span class="nav-name" id="navName">Admin</span>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- Charts row -->
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;">

    <!-- Bookings chart -->
    <div class="card">
      <div class="card-title">Bookings — Last 7 Days</div>
      <div class="card-subtitle">Daily booking activity</div>
      <canvas id="bookingsChart" height="200"></canvas>
    </div>

    <!-- Slot status chart -->
    <div class="card">
      <div class="card-title">Slot Status</div>
      <div class="card-subtitle">Current slot distribution</div>
      <canvas id="slotChart" height="200"></canvas>
    </div>

  </div>

  <!-- Recent bookings -->
  <div class="card">
    <div class="card-title">Recent Bookings</div>
    <div class="card-subtitle">Latest 10 bookings across all users</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Slot</th>
            <th>Floor</th>
            <th>Vehicle</th>
            <th>Booked At</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="recentBookings">
          <tr><td colspan="6" style="text-align:center;color:#8892a4;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="../script.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user || user.role !== 'admin') window.location.href = '../index.html';
  document.getElementById('navName').textContent   = user.name;
  document.getElementById('navAvatar').textContent = user.name.charAt(0).toUpperCase();

  async function loadDashboard() {
    const stats = await apiGet('/admin/stats');

    document.getElementById('statsGrid').innerHTML = `
  <div class="stat-card">
    <div class="stat-icon blue">👥</div>
    <div class="stat-info"><div class="number">${stats.totalUsers}</div><div class="label">Total Users</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon blue">🅿️</div>
    <div class="stat-info"><div class="number">${stats.totalSlots}</div><div class="label">Total Slots</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon green">✅</div>
    <div class="stat-info"><div class="number">${stats.availableSlots}</div><div class="label">Available</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon red">🚫</div>
    <div class="stat-info"><div class="number">${stats.occupiedSlots}</div><div class="label">Occupied</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon orange">📋</div>
    <div class="stat-info"><div class="number">${stats.activeBookings}</div><div class="label">Active Bookings</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon green">💰</div>
    <div class="stat-info"><div class="number">₹${stats.totalRevenue}</div><div class="label">Total Revenue</div></div>
  </div>
`;

    // Slot donut chart
    new Chart(document.getElementById('slotChart'), {
      type: 'doughnut',
      data: {
        labels: ['Available', 'Occupied', 'Reserved'],
        datasets: [{
          data: [stats.availableSlots, stats.occupiedSlots,
                 stats.totalSlots - stats.availableSlots - stats.occupiedSlots],
          backgroundColor: ['#2e7d32', '#c62828', '#e65100'],
          borderWidth: 0
        }]
      },
      options: { plugins: { legend: { position: 'bottom' } }, cutout: '65%' }
    });

    // Bookings line chart
    const chartData = await apiGet('/admin/chart/bookings');
    const labels = chartData.map(d => new Date(d.date).toLocaleDateString('en-IN', { month:'short', day:'numeric' }));
    const counts  = chartData.map(d => d.count);

    new Chart(document.getElementById('bookingsChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Bookings',
          data: counts,
          backgroundColor: 'rgba(26,115,232,0.15)',
          borderColor: '#1a73e8',
          borderWidth: 2,
          borderRadius: 6
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
      }
    });

    // Recent bookings
    const bookings = await apiGet('/admin/bookings');
    const recent   = bookings.slice(0, 10);
    document.getElementById('recentBookings').innerHTML = recent.length === 0
      ? '<tr><td colspan="6" style="text-align:center;color:#8892a4;">No bookings yet</td></tr>'
      : recent.map(b => `
          <tr>
            <td><strong>${b.user_name}</strong><br><span style="font-size:12px;color:#8892a4;">${b.email}</span></td>
            <td>${b.slot_number}</td>
            <td>${b.floor}</td>
            <td>${b.vehicle_number}</td>
            <td>${new Date(b.created_at).toLocaleString()}</td>
            <td><span class="badge badge-${b.status}">${b.status}</span></td>
          </tr>`).join('');
  }

  loadDashboard();
</script>
</body>
</html>
