<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Bookings — Admin</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<nav class="navbar">
  <h2>🅿️ Smart<span>Park</span> <span style="font-size:11px;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:10px;margin-left:6px;">ADMIN</span></h2>
  <div class="nav-links">
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-slots.html">Manage Slots</a>
    <a href="admin-bookings.html" class="active">Bookings</a>
    <a href="admin-users.html">Users</a>
  </div>
  <div style="display:flex;align-items:center;">
    <div class="nav-user">
      <div class="nav-avatar">A</div>
      <span class="nav-name" id="navName">Admin</span>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="card">
    <div class="card-title">All Bookings</div>
    <div class="card-subtitle">Manage all parking bookings across all users</div>

    <!-- Filter tabs -->
    <div class="filter-tabs">
      <div class="tab active" onclick="setFilter('all',this)">All</div>
      <div class="tab" onclick="setFilter('active',this)">Active</div>
      <div class="tab" onclick="setFilter('completed',this)">Completed</div>
      <div class="tab" onclick="setFilter('cancelled',this)">Cancelled</div>
    </div>

    <!-- Search -->
    <div class="search-wrap" style="margin-bottom:16px;">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by user name or slot..." oninput="renderBookings()">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Slot</th>
            <th>Floor</th>
            <th>Vehicle</th>
            <th>Booked At</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="bookingsTable">
          <tr><td colspan="7" style="text-align:center;color:#8892a4;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="../script.js"></script>
<script>
  let allBookings  = [];
  let currentFilter = 'all';
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user || user.role !== 'admin') window.location.href = '../index.html';
  document.getElementById('navName').textContent = user.name;

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderBookings();
  }

  function renderBookings() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let list = currentFilter === 'all' ? allBookings : allBookings.filter(b => b.status === currentFilter);
    list = list.filter(b =>
      b.user_name.toLowerCase().includes(search) ||
      b.slot_number.toLowerCase().includes(search)
    );
    const tbody = document.getElementById('bookingsTable');
    if (list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#8892a4;">No bookings found</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(b => `
      <tr>
        <td>
          <strong>${b.user_name}</strong>
          <br><span style="font-size:12px;color:#8892a4;">${b.email}</span>
        </td>
        <td>${b.slot_number}</td>
        <td>${b.floor}</td>
        <td>${b.vehicle_number}</td>
        <td>${new Date(b.created_at).toLocaleString()}</td>
        <td><span class="badge badge-${b.status}">${b.status}</span></td>
        <td>
          ${b.status === 'active'
            ? `<button class="btn btn-danger btn-sm" onclick="cancelBooking(${b.id})">Cancel</button>`
            : '-'}
        </td>
      </tr>
    `).join('');
  }

  async function cancelBooking(id) {
    if (!confirm('Cancel this booking?')) return;
    const data = await apiPut(`/admin/bookings/cancel/${id}`, {});
    alert(data.message || data.error);
    allBookings = await apiGet('/admin/bookings');
    renderBookings();
  }

  async function load() {
    allBookings = await apiGet('/admin/bookings');
    renderBookings();
  }
  load();
</script>
</body>
</html>
