<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Bookings — SmartPark Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../animations.css">
  <link rel="stylesheet" href="../premium.css">
</head>
<body class="p-bg">

<div id="page-loader">
  <div class="loader-icon">🅿️</div>
  <div class="loader-title">SmartPark Admin</div>
  <div class="loader-track"><div class="loader-fill"></div></div>
  <div class="loader-dots">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
</div>
<div class="particles-container"></div>
<button id="scroll-top">↑</button>

<nav class="p-navbar">
  <a href="admin-dashboard.html" class="p-navbar-logo">
    <div class="p-logo-icon">🅿️</div>
    SmartPark
    <span style="font-size:10px;background:rgba(139,92,246,0.3);color:#c4b5fd;
                 padding:2px 8px;border-radius:10px;border:1px solid rgba(139,92,246,0.3);">ADMIN</span>
  </a>
  <div class="p-nav-links">
    <a href="admin-dashboard.html" class="p-nav-link">Dashboard</a>
    <a href="admin-slots.html"     class="p-nav-link">Slots</a>
    <a href="admin-bookings.html"  class="p-nav-link active">Bookings</a>
    <a href="admin-users.html"     class="p-nav-link">Users</a>
    <a href="admin-locations.html" class="p-nav-link">Locations</a>
  </div>
  <div style="display:flex;align-items:center;">
    <div class="p-nav-user">
      <div class="p-nav-avatar">A</div>
      <span class="p-nav-name" id="navName">Admin</span>
    </div>
    <button class="p-btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div style="max-width:1080px;margin:32px auto;padding:0 24px;">
  <div class="glass-card">
    <div class="p-section-tag">Manage</div>
    <div class="p-section-title">All Bookings</div>
    <p class="p-section-sub">Manage all parking bookings across all users</p>

    <div class="p-filter-tabs">
      <div class="p-tab active" onclick="setFilter('all',this)">All</div>
      <div class="p-tab" onclick="setFilter('active',this)">Active</div>
      <div class="p-tab" onclick="setFilter('completed',this)">Completed</div>
      <div class="p-tab" onclick="setFilter('cancelled',this)">Cancelled</div>
    </div>

    <div class="p-search-wrap">
      <span class="p-search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by user or slot..."
             oninput="renderBookings()">
    </div>

    <div class="p-table-wrap">
      <table class="p-table">
        <thead>
          <tr>
            <th>User</th><th>Slot</th><th>Floor</th>
            <th>Vehicle</th><th>Booked At</th><th>Status</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="bookingsTable">
          <tr><td colspan="7" style="text-align:center;color:var(--p-text3);padding:24px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="../script.js"></script>
<script src="../app.js"></script>
<script>
  let allBookings = [], currentFilter = 'all';
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user||user.role!=='admin') window.location.href='../index.html';
  document.getElementById('navName').textContent = user.name;
  function logout() { localStorage.clear(); window.location.href='../index.html'; }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.p-tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    renderBookings();
  }

  function renderBookings() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let list = currentFilter==='all' ? allBookings : allBookings.filter(b=>b.status===currentFilter);
    list = list.filter(b=>
      b.user_name.toLowerCase().includes(search)||
      b.slot_number.toLowerCase().includes(search)
    );
    const tbody = document.getElementById('bookingsTable');
    if (!list.length) {
      tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;color:var(--p-text3);padding:24px;">No bookings found</td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(b=>`
      <tr>
        <td><strong style="color:var(--p-text);">${b.user_name}</strong><br>
            <span style="font-size:12px;color:var(--p-text3);">${b.email}</span></td>
        <td style="color:var(--p-text);">${b.slot_number}</td>
        <td>${b.floor}</td>
        <td>${b.vehicle_number}</td>
        <td>${new Date(b.created_at).toLocaleString()}</td>
        <td><span class="p-badge p-badge-${b.status}">${b.status}</span></td>
        <td>${b.status==='active'
          ? `<button class="p-btn p-btn-danger p-btn-sm" onclick="cancelBooking(${b.id})">Cancel</button>`
          : '—'}</td>
      </tr>`).join('');
  }

  async function cancelBooking(id) {
    if (!confirm('Cancel this booking?')) return;
    const data = await apiPut(`/admin/bookings/cancel/${id}`,{});
    alert(data.message||data.error);
    allBookings = await apiGet('/admin/bookings');
    renderBookings();
  }

  async function load() {
    allBookings = await apiGet('/admin/bookings');
    renderBookings();
  }
  load();
</script>
</body>
</html>
