<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Slots — SmartPark Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../animations.css">
  <link rel="stylesheet" href="../premium.css">
</head>
<body class="p-bg">

<div id="page-loader">
  <div class="loader-icon">🅿️</div>
  <div class="loader-title">SmartPark Admin</div>
  <div class="loader-track"><div class="loader-fill"></div></div>
  <div class="loader-dots">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
</div>
<div class="particles-container"></div>
<button id="scroll-top">↑</button>

<nav class="p-navbar">
  <a href="admin-dashboard.html" class="p-navbar-logo">
    <div class="p-logo-icon">🅿️</div>
    SmartPark
    <span style="font-size:10px;background:rgba(139,92,246,0.3);color:#c4b5fd;
                 padding:2px 8px;border-radius:10px;border:1px solid rgba(139,92,246,0.3);">ADMIN</span>
  </a>
  <div class="p-nav-links">
    <a href="admin-dashboard.html" class="p-nav-link">Dashboard</a>
    <a href="admin-slots.html"     class="p-nav-link active">Slots</a>
    <a href="admin-bookings.html"  class="p-nav-link">Bookings</a>
    <a href="admin-users.html"     class="p-nav-link">Users</a>
    <a href="admin-locations.html" class="p-nav-link">Locations</a>
  </div>
  <div style="display:flex;align-items:center;">
    <div class="p-nav-user">
      <div class="p-nav-avatar">A</div>
      <span class="p-nav-name" id="navName">Admin</span>
    </div>
    <button class="p-btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div style="max-width:1080px;margin:32px auto;padding:0 24px;">

  <div class="glass-card" style="margin-bottom:24px;">
    <div class="p-section-tag">Manage</div>
    <div class="p-section-title">Add New Slot</div>
    <p class="p-section-sub">Add a new parking slot to the system</p>

    <div class="p-alert p-alert-error"   id="errorMsg"></div>
    <div class="p-alert p-alert-success" id="successMsg"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="p-form-group" style="margin-bottom:0;">
        <label class="p-form-label">Slot Number</label>
        <input class="p-form-input" type="text" id="slotNumber" placeholder="e.g. D1">
      </div>
      <div class="p-form-group" style="margin-bottom:0;">
        <label class="p-form-label">Floor</label>
        <select class="p-form-input" id="slotFloor">
          <option value="Ground Floor">Ground Floor</option>
          <option value="First Floor">First Floor</option>
          <option value="Second Floor">Second Floor</option>
          <option value="Third Floor">Third Floor</option>
        </select>
      </div>
    </div>
    <button class="p-btn p-btn-primary" style="width:auto;margin-top:16px;padding:12px 28px;"
            onclick="addSlot()">+ Add Slot</button>
  </div>

  <div class="glass-card">
    <div class="p-section-tag">All Slots</div>
    <div class="p-section-title">Parking Slots</div>
    <p class="p-section-sub" id="slotCount">Loading...</p>
    <div class="p-table-wrap">
      <table class="p-table">
        <thead>
          <tr><th>#</th><th>Slot Number</th><th>Floor</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="slotsTable">
          <tr><td colspan="5" style="text-align:center;color:var(--p-text3);padding:24px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="../script.js"></script>
<script src="../app.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user||user.role!=='admin') window.location.href='../index.html';
  document.getElementById('navName').textContent = user.name;
  function logout() { localStorage.clear(); window.location.href='../index.html'; }

  function showAlert(id, msg, type='error') {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = `p-alert p-alert-${type}`;
    el.style.display = 'flex';
    setTimeout(()=>el.style.display='none',4000);
  }

  async function loadSlots() {
    const slots = await apiGet('/slots');
    document.getElementById('slotCount').textContent = `${slots.length} total slots`;
    document.getElementById('slotsTable').innerHTML = slots.map((s,i)=>`
      <tr>
        <td style="color:var(--p-text3);">${i+1}</td>
        <td><strong style="color:var(--p-text);">${s.slot_number}</strong></td>
        <td>${s.floor}</td>
        <td><span class="p-badge p-badge-${s.status}">${s.status}</span></td>
        <td style="display:flex;gap:8px;flex-wrap:wrap;">
          ${s.status!=='available'
            ? `<button class="p-btn p-btn-success p-btn-sm" onclick="setStatus(${s.id},'available')">Set Available</button>`
            : `<button class="p-btn p-btn-danger  p-btn-sm" onclick="setStatus(${s.id},'occupied')">Set Occupied</button>`}
          <button class="p-btn p-btn-ghost p-btn-sm" onclick="deleteSlot(${s.id},'${s.slot_number}')">🗑 Delete</button>
        </td>
      </tr>`).join('');
  }

  async function addSlot() {
    const slot_number = document.getElementById('slotNumber').value.trim().toUpperCase();
    const floor       = document.getElementById('slotFloor').value;
    if (!slot_number) { showAlert('errorMsg','Please enter a slot number'); return; }
    const data = await apiPost('/admin/slots',{ slot_number, floor });
    if (data.message) {
      showAlert('successMsg', data.message, 'success');
      document.getElementById('slotNumber').value = '';
      loadSlots();
    } else { showAlert('errorMsg', data.error); }
  }

  async function setStatus(id, status) {
    const data = await apiPut(`/admin/slots/${id}`,{ status });
    alert(data.message||data.error);
    loadSlots();
  }

  async function deleteSlot(id, name) {
    if (!confirm(`Delete slot ${name}?`)) return;
    const data = await apiDelete(`/admin/slots/${id}`);
    alert(data.message||data.error);
    loadSlots();
  }

  loadSlots();
</script>
</body>
</html>
